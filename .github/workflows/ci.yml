name: Docker Build and Push CI

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 자동 실행됩니다.
  workflow_dispatch:  # GitHub 웹사이트에서 수동으로 실행할 수 있게 해줍니다.

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        # GitHub Repository -> Settings -> Secrets and variables -> Actions 에 
        # DOCKERHUB_USERNAME 과 DOCKERHUB_TOKEN 을 등록하셔야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push FastAPI Spam Classifier Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 자신의 DockerHub ID / 프로젝트 이름 으로 올라갑니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
          # 빌드 속도를 매우 빠르게 만들어주는 GitHub Actions 전용 캐시 사용
          cache-from: type=gha
          cache-to: type=gha,mode=max
