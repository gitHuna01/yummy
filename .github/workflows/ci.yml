name: Docker Build and Push CI

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 자동 실행됩니다.
  workflow_dispatch:  # GitHub 웹사이트에서 수동으로 실행할 수 있게 해줍니다.

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        # GitHub Repository -> Settings -> Secrets and variables -> Actions 에 
        # DOCKERHUB_USERNAME 과 DOCKERHUB_TOKEN 을 등록하셔야 합니다.
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push FastAPI Spam Classifier Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 자신의 DockerHub ID / 프로젝트 이름 으로 올라갑니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
          # 빌드 속도를 매우 빠르게 만들어주는 GitHub Actions 전용 캐시 사용
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚚 Move to Deployment (Local Run)
        # 이 단계는 빌드가 끝난 뒤 최신 이미지를 로컬에서 자동으로 실행합니다.
        run: |
          # 1. 기존에 실행 중인 컨테이너가 있다면 중지하고 삭제합니다.
          docker stop spam-classifier || true
          docker rm spam-classifier || true
          
          # 2. 방금 올린 최신 이미지를 다시 내려받습니다 (이미 로컬에 있지만 갱신 확인).
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
          
          # 3. 새로운 컨테이너를 실행합니다.
          docker run -d --name spam-classifier -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/spam-classifier:latest
          
          # 4. 결과 확인
          docker ps | grep spam-classifier
